# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, preferred, auto, 1
monitor = HDMI-A-1, preferred, auto-left, 1
monitor = DP-3, preferred, auto-right, 1
monitor = , preferred, auto, 1, mirror, eDP-1

# For headless stuff over sunshine/moonlight
monitor = HEADLESS-1, 1920x1080@60, 0x0, 1

# -----------------------------------------------------
# Plugins
# -----------------------------------------------------
plugin = /etc/hyprland/plugins/hyprsplit.so
plugin {
    hyprsplit {
        num_workspaces = 10
        persistent_workspaces = true
    }
}

# -----------------------------------------------------
# Autostart & Environment
# -----------------------------------------------------
exec-once = fish -c autostart

# Source macchiato colors
# source = ~/.config/hypr/macchiato.conf
source = ~/.config/hypr/gruvbox.conf

# env = HYPRCURSOR_THEME,Catppuccin-Macchiato-Teal
# env = HYPRCURSOR_SIZE,24
# env = XCURSOR_THEME,Catppuccin-Macchiato-Teal
# env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,breeze_cursors
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24
env = XDG_MENU_PREFIX,plasma-

# -----------------------------------------------------
# General Settings
# -----------------------------------------------------
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_rules =

    # Merged from IntelliJ fix
    follow_mouse = 1
    
    touchpad {
        natural_scroll = yes
        tap-and-drag = true
    }

    sensitivity = 0 
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $yellow
    col.inactive_border = $surface1

    layout = dwindle
}

decoration {
    rounding = 10

    blur {
        size = 8
        passes = 2
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        offset = 0, 0
        color = $yellow
        color_inactive = 0xff$baseAlpha
    }
    
    active_opacity = 1
    inactive_opacity = 1
    # active_opacity = 0.98
    # inactive_opacity = 0.80
    fullscreen_opacity = 1
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 3, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 1, default
}

dwindle {
    pseudotile = yes 
    preserve_split = yes 
    force_split = 2
}

master {
    new_status = master
}

gesture = 3, horizontal, workspace

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = 0x24273a
}

binds {
    workspace_back_and_forth = true
}

device {
    name = epic mouse V1
    sensitivity = -0.5
}
# -----------------------------------------------------
# Window & Layer Rules (Updated to V3 Syntax)
# -----------------------------------------------------

layerrule {
    name = logout_blur
    match:namespace = logout_dialog
    blur = on
}

windowrule {
    name = mpv_media
    match:title = .*mpv$
    float = on
    opaque = on
    size = 50% 50%
}
windowrule {
    name = Board_Game_Search_Project
    match:class = MeepMeep
    float = on
    opaque = on
    size = 50% 50%
}

windowrule {
    name = video_media
    match:content = video
    float = on
    opaque = on
    size = 50% 50%
}

windowrule {
    name = imv_media
    match:title = .*imv.*
    float = on
    opaque = on
    size = 70% 70%
}

windowrule {
    name = photo_media
    match:content = photo
    float = on
    opaque = on
    size = 70% 70%
}

windowrule {
    name = pdf_viewer
    match:title = .*\.pdf$
    float = on
    opaque = on
    maximize = on
}

windowrule {
    name = youtube_opaque
    match:title = .*YouTube.*
    opaque = on
}

windowrule {
    name = swappy_screenshot
    match:title = swappy
    opaque = on
    center = on
    stay_focused = on
}

windowrule {
    name = brave_opacity
    match:class = ^(brave-browser)$
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = vscode_opacity
    match:class = ^(code)$
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = obsidian_opacity
    match:class = ^(obsidian)$
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = dolphin_opacity
    match:class = ^(Dolphin)$
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = wezterm_dropdown
    match:title = ^wezterm_dropdown$
    float = on
}

windowrule {
    name = volume_control
    match:title = ^Volume Control$
    float = on
    opacity = 1.0 override 1.0 override
    size = 70% 70%
}

windowrule {
    name = discord_workspace
    match:class = ^(discord)$
    workspace = special:discord
    float = on
    maximize = on
}

windowrule {
    name = spotify_workspace
    match:class = ^(spotify)$
    workspace = special:spotify
    float = on
    maximize = on
}

windowrule {
    name = calculator_workspace
    match:class = qalculate-gtk
    workspace = special:calculator
    float = on
}

windowrule {
    name = overskride_float
    match:title = .*overskride$
    float = on
}

windowrule {
    name = brave_pwa_float
    match:class = ^(brave-nngceckbapebfimnlniiiahkandclblb-Default)$
    float = on
}

windowrule {
    name = network_connections
    match:title = .*Network Connections$
    float = on
}

# Jetbrains fix
windowrule {
    name = jetbrains_flicker_fix
    match:class = ^jetbrains-(?!toolbox)
    match:title = ^win\d+$
    float = on
    no_initial_focus = on
}

# -----------------------------------------------------
# Special Workspaces
# -----------------------------------------------------
workspace = special:discord, on-created-empty:discord
# workspace = special:spotify, on-created-empty:spotify
# workspace = special:spotify, on-created-empty:sh -c 'spotify & disown'
workspace = special:spotify, on-created-empty:uwsm app -- spotify
workspace = special:messages, on-created-empty:brave --new-window https://messages.google.com/web/u/1/conversations 

