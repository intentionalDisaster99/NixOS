# Trying this instead
# TODO move this to the top
source = ~/.config/hypr/hyprvim/init.conf



# Resize Submap
bind = $mainMod ALT, R, submap, resize
submap = resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
bind = , escape, submap, reset 
submap = reset

# Move Submap
bind = $mainMod ALT, M, submap, move
submap = move
bind = , right, movewindow, r
bind = , left, movewindow, l
bind = , up, movewindow, u
bind = , down, movewindow, d
bind = , l, movewindow, r
bind = , h, movewindow, l
bind = , k, movewindow, u
bind = , j, movewindow, d
bind = , escape, submap, reset 
submap = reset

# Scratchpads
bind = $mainMod, O, exec, pypr toggle term
bind = $mainMod, V, exec, fish -c clipboard_to_type
bind = $mainMod CTRL, V, exec, pypr toggle volume
bind = $mainMod CTRL, E, exec, pypr expose
bind = $mainMod, Z, exec, pypr zoom

# Magic / Minimized Workspaces
bind = $mainMod SHIFT, J, movetoworkspace, special:magic
bind = $mainMod, J, togglespecialworkspace, magic

bind = SUPER, K, exec, pgrep qalculate-gtk && hyprctl dispatch togglespecialworkspace calculator || qalculate-gtk &

# Things I want to float binds...
bind = $mainMod, T, exec, nvidia-offload kitty
bind = $mainMod SHIFT, T, exec, Telegram
bind = $mainMod, S, togglespecialworkspace, spotify
bind = $mainMod SHIFT, l, exec, fish -c wlogout_uniqe
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, C, exec, hyprpicker -a
bind = $mainMod SHIFT, C, exec, pypr menu "Color picker"
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, F, togglefloating, 
bind = $mainMod CTRL, F, fullscreen, 0
bind = $mainMod SHIFT, P, pseudo, 
bind = $mainMod SHIFT, O, togglesplit, 

# Custom App Launchers
bind = $mainMod, T, exec, kitty                         
bind = ALT, SPACE, exec, rofi -show drun                
bind = $mainMod, B, exec, brave --password-store=gnome  
bind = SUPER, I, exec, code                             
bind = $mainMod, D, togglespecialworkspace, discord     
bind = $mainMod, M, togglespecialworkspace, messages    
bind = $mainMod, E, exec, dolphin # Could also be nautilus                      
bind = $mainMod, N, exec, obsidian                      
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, W, exec, fish -c wall_toggle           
bind = $mainMod SHIFT, T, exec, grim -g "$(slurp)" - | tesseract - - | wl-copy 
bind = $mainMod SHIFT, E, exec, grim -g "$(slurp)" - | swappy -f - 
bind = $mainMod SHIFT, V, exec, emote                   
bind = $mainMod, U, exec, fish -c wgnord_toggle         
bind = $mainMod, SPACE, exec, fish -c steno_toggle      
bind = $mainMod, P, exec, fish -c power_save_toggle     
bind = $mainMod, G, exec, steam

bind = $mainMod SHIFT, A, exec, kitty -c airplane_mode_toggle
bind = $mainMod SHIFT, N, exec, dunstctl set-paused toggle
bind = $mainMod SHIFT, Y, exec, kitty -c bluetooth_toggle
bind = $mainMod SHIFT, W, exec, kitty -c wifi_toggle

# Media Controls
bind = $mainMod CTRL, p, exec, playerctl play-pause
bind = $mainMod, bracketright, exec, playerctl next
bind = $mainMod, bracketleft, exec, playerctl previous

bind = , XF86AudioRaiseVolume, exec, volumectl -u up
bind = , XF86AudioLowerVolume, exec, volumectl -u down
bind = , XF86AudioMute, exec, volumectl toggle-mute
bind = , XF86AudioMicMute, exec, volumectl -m toggle-mute

bind = , XF86MonBrightnessUp, exec, lightctl -D intel_backlight up
bind = , XF86MonBrightnessDown, exec, lightctl -D intel_backlight down

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, Tab, cyclenext,
bind = $mainMod, Tab, bringactivetotop,

# Workspaces (hyprsplit plugin commands)
bind = $mainMod, 1, split:workspace, 1
bind = $mainMod, 2, split:workspace, 2
bind = $mainMod, 3, split:workspace, 3
bind = $mainMod, 4, split:workspace, 4
bind = $mainMod, 5, split:workspace, 5
bind = $mainMod, 6, split:workspace, 6
bind = $mainMod, 7, split:workspace, 7
bind = $mainMod, 8, split:workspace, 8
bind = $mainMod, 9, split:workspace, 9
bind = $mainMod, 0, split:workspace, 10

bind = $mainMod SHIFT, 1, split:movetoworkspace, 1
bind = $mainMod SHIFT, 2, split:movetoworkspace, 2
bind = $mainMod SHIFT, 3, split:movetoworkspace, 3
bind = $mainMod SHIFT, 4, split:movetoworkspace, 4
bind = $mainMod SHIFT, 5, split:movetoworkspace, 5
bind = $mainMod SHIFT, 6, split:movetoworkspace, 6
bind = $mainMod SHIFT, 7, split:movetoworkspace, 7
bind = $mainMod SHIFT, 8, split:movetoworkspace, 8
bind = $mainMod SHIFT, 9, split:movetoworkspace, 9
bind = $mainMod SHIFT, 0, split:movetoworkspace, 10

# Scroll / Cycle Workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, code:60 , workspace, e+1      # > key
bind = $mainMod, code:59 , workspace, e-1      # < key
bind = $mainMod, code:61 , workspace, empty    # / key

# Mouse Resizing
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Source specific device config
source = host-specific/auto.conf
