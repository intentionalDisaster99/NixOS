[pyprland]
plugins = [
  "scratchpads",
  "magnify",
  "expose",
  "shortcuts_menu",
  "toggle_special",
]

# [scratchpads.term]
# command = "wezterm start --always-new-process"
# class = "wezterm_dropdown"
# animation = "fromTop"
# unfocus = "hide"
# excludes = "*"
# lazy = true
# multi = false
[scratchpads.term]
animation = "fromTop"
command = "kitty --class kit-term"
class = "kit-term"
size = "75% 60%"
lazy = true

[scratchpads.volume]
command = "pavucontrol"
animation = "fromLeft"
class = "volume_sidemenu"
size = "40% 70%"
unfocus = "hide"
excludes = "*"
lazy = true
margin = 90
multi = false

[shortcuts_menu.entries]

"Color picker" = [
    {name="format", options=["hex", "rgb", "hsv", "hsl", "cmyk"]},
    "sleep 0.2; hyprpicker --format [format] -a" # sleep to let the menu close before the picker opens
]


[scratchpads.spotify]
animation = "fromBottom"
command = "spotify"
class = "Spotify"
size = "80% 80%"
lazy = true


[scratchpads.discord]
animation = "fromBottom"
command = "discord"
class = "Discord"
size = "80% 80%"
lazy = true