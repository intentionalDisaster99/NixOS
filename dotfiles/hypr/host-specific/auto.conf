exec-once = sh -c '
case "$(hostname)" in
  gluon)
    echo "source = $HOME/dotfiles/hypr/host-specific/gluon.conf"
    ;;
  higgs-boson)
    echo "source = $HOME/dotfiles/hypr/host-specific/higgs-boson.conf"
    ;;
  *)
    echo "# no host-specific config"
    ;;
esac > /tmp/hypr-host.conf
'

source = /tmp/hypr-host.conf
