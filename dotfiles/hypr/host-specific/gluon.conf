# ---------------------------------------
# Brightness control (DDC, chorded)
# ---------------------------------------

bind = SUPER, ALT, b, submap, brightness

# -------- monitor selection --------
submap = brightness

bind = , 1, submap, brightness_mon1
bind = , 2, submap, brightness_mon2
bind = , 3, submap, brightness_mon3

bind = , q, submap, reset
bind = , escape, submap, reset

# -------- Monitor 1 (Dell 1708FP) --------
submap = brightness_mon1

bind = , k, exec, ddcutil --display 1 setvcp 10 + 10
bind = , j, exec, ddcutil --display 1 setvcp 10 - 10
bind = , K, exec, ddcutil --display 1 setvcp 10 + 2
bind = , J, exec, ddcutil --display 1 setvcp 10 - 2

bind = , q, submap, reset
bind = , escape, submap, reset

# -------- Monitor 2 (HP 27xw) --------
submap = brightness_mon2

bind = , k, exec, ddcutil --display 2 setvcp 10 + 10
bind = , j, exec, ddcutil --display 2 setvcp 10 - 10
bind = , K, exec, ddcutil --display 2 setvcp 10 + 2
bind = , J, exec, ddcutil --display 2 setvcp 10 - 2

bind = , q, submap, reset
bind = , escape, submap, reset

# -------- Monitor 3 (IBM L171) --------
submap = brightness_mon3

bind = , k, exec, ddcutil --display 3 setvcp 10 + 10
bind = , j, exec, ddcutil --display 3 setvcp 10 - 10
bind = , K, exec, ddcutil --display 3 setvcp 10 + 2
bind = , J, exec, ddcutil --display 3 setvcp 10 - 2

bind = , q, submap, reset
bind = , escape, submap, reset

submap = reset


