# NixOS/dotfiles/starship.toml

# Increase timeout in order to stop the warning
scan_timeout = 100

format = """
$cmd_duration\
$line_break\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nix_shell\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$python\
$docker_context\
$character"""

[os]
disabled = false
style = "bold blue"

[os.symbols]
NixOS = " "

[username]
style_user = "white bold"
style_root = "black bold"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "@[$hostname](bold red) "
disabled = false

[directory]
read_only = " 󰌾"
truncation_length = 2
truncate_to_repo = false
style = "bold lavender"
 
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[git_branch] 
symbol = " "
format = "on branch [$branch]($style) "
style = "bold rosewater"

[git_status]
format = "[($all_status$ahead_behind)]($style) "
style = "bold maroon"

[nix_shell]
disabled = false
impure_msg = '[dev-shell](bold red)'
pure_msg = '[pure-shell](bold green)'
unknown_msg = '[nix-shell](bold yellow)'
format = 'via [$symbol$state]($style) '
symbol = ' '

# Catppuccin Macchiato Palette (optional, Starship usually auto-detects terminal colors)
[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#9399b2"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
